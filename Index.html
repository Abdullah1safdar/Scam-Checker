<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scam Checker Pro</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: #111827;
  padding: 30px;
  border-radius: 16px;
  width: 420px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 5px;
}

p {
  font-size: 13px;
  color: #9ca3af;
}

textarea {
  width: 100%;
  height: 130px;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  resize: none;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.loading {
  display: none;
  margin-top: 15px;
  color: #60a5fa;
}

.dots::after {
  content: '';
  animation: dots 1.2s infinite;
}

@keyframes dots {
  0% { content: '';}
  33% { content: '.';}
  66% { content: '..';}
  100% { content: '...';}
}

.small {
  font-size: 11px;
  margin-top: 10px;
  color: #6b7280;
}
</style>
</head>
<body>

<div class="box">
  <h2>🛡️ Scam Checker Pro</h2>
  <p>Check any message for scams in seconds</p>

  <textarea id="message" placeholder="Paste suspicious message..."></textarea>

  <button onclick="checkScam()">Analyze Message</button>

  <div class="loading" id="loading">
    🔍 Analyzing message<span class="dots"></span>
  </div>

  <p class="small">Powered by AI analysis system</p>
</div>

<script>
function checkScam() {
  let msg = document.getElementById("message").value;

  if (!msg) {
    alert("Please paste a message first");
    return;
  }

  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    let prompt = `Check if this message is a scam. Explain simply. Tell if it's safe or dangerous. Give advice.\n\nMessage:\n${msg}`;

    let url = "https://chat.openai.com/?q=" + encodeURIComponent(prompt);

    window.open(url, "_blank");

    document.getElementById("loading").style.display = "none";
  }, 2000);
}
</script>

</body>
</html>
